name: CI/CD — Go Docs

# ─────────────────────────────────────────────
# GATILHOS
# ─────────────────────────────────────────────
on:
  pull_request:
    branches:
      - main            # roda em todo PR aberto para main

  push:
    branches:
      - main            # roda após merge na main

  schedule:
    - cron: "0 0 * * 0" # toda domingo à meia-noite (UTC)

# ─────────────────────────────────────────────
# PERMISSÕES PARA GITHUB PAGES
# ─────────────────────────────────────────────
permissions:
  contents: read
  pages: write
  id-token: write

# ─────────────────────────────────────────────
# JOB 1 — VALIDAÇÃO COM MATRIX (build em múltiplas versões Python)
# ─────────────────────────────────────────────
jobs:
  validate:
    name: "Validar Build (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
      fail-fast: false  # continua testando a outra versão mesmo se uma falhar

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ── CACHE de dependências pip ──────────────────────
      - name: Cache das dependências pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ matrix.python-version }}-

      - name: Instalar Zensical
        run: pip install zensical

      - name: Validar build do site
        run: zensical build

  # ─────────────────────────────────────────────
  # JOB 2 — BUILD FINAL E UPLOAD DO ARTEFATO
  # Só executa após a matrix de validação passar
  # ─────────────────────────────────────────────
  build_site:
    name: "Build final do site"
    runs-on: ubuntu-latest
    needs: validate  # aguarda validate concluir com sucesso

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── CACHE reutilizado do job anterior ─────────────
      - name: Cache das dependências pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-3.11-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-3.11-

      - name: Instalar Zensical
        run: pip install zensical

      - name: Build do site
        run: zensical build

      # ── UPLOAD DO ARTEFATO GERADO ─────────────────────
      - name: Empacotar e fazer upload do artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site  # diretório gerado pelo zensical build

  # ─────────────────────────────────────────────
  # JOB 3 — DEPLOY NO GITHUB PAGES
  # CONDICIONAL: só roda em push na main ou schedule
  # NUNCA roda em Pull Request
  # ─────────────────────────────────────────────
  deploy_site:
    name: "Deploy no GitHub Pages"
    runs-on: ubuntu-latest
    needs: build_site  # aguarda build_site concluir com sucesso

    # SEGURANÇA: bloqueia deploy durante PRs
    if: github.event_name == 'push' || github.event_name == 'schedule'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download do artefato gerado
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: ./site

      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

